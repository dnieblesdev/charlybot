server {
    listen 4201;
    root /usr/share/nginx/html;

    # Dashboard app at /dashboard/ — Angular built with baseHref "/dashboard/"
    location /dashboard/ {
        alias /usr/share/nginx/html/dashboard/;
        try_files $uri $uri/ /dashboard/index.html;
    }

    # Auth callback routes to dashboard SPA
    location /auth/ {
        alias /usr/share/nginx/html/dashboard/;
        try_files $uri $uri/ /dashboard/index.html;
    }

    # Security headers
    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:; frame-ancestors 'none'; report-uri /csp-violation" always;
    }

    # Health check
    location = /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
