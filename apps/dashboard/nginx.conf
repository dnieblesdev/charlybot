server {
    listen 4201;
    root /usr/share/nginx/html;

    # ── Security headers ────────────────────────────────────────────────────────
    # NOTE: Adding `add_header` in any `location` block OVERRIDES (does not merge)
    # all server-level headers for that location. Always keep headers at server {}
    # scope and avoid adding new `add_header` directives in location blocks.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP in Report-Only: reports violations without blocking Angular runtime styles.
    # Switch to enforced Content-Security-Policy after validating policy via reports.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:; frame-ancestors 'none'" always;
    # ─────────────────────────────────────────────────────────────────────────────

    # Dashboard app at /dashboard/ — Angular built with baseHref "/dashboard/"
    location /dashboard/ {
        alias /usr/share/nginx/html/dashboard/;
        try_files $uri $uri/ /dashboard/index.html;
    }

    # Auth callback routes to dashboard SPA
    location /auth/ {
        alias /usr/share/nginx/html/dashboard/;
        try_files $uri $uri/ /dashboard/index.html;
    }

    # Health check
    # NOTE: `add_header` in location OVERRIDES server-level headers.
    # Must duplicate security headers here to preserve them.
    location = /health {
        default_type application/json;
        return 200 '{"status":"ok"}';
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:; frame-ancestors 'none'" always;
    }
}
