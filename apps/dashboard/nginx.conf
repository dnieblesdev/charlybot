server {
    listen 4201;
    root /usr/share/nginx/html;

    # Dashboard app at /dashboard/ — Angular built with baseHref "/dashboard/"
    location /dashboard/ {
        alias /usr/share/nginx/html/dashboard/;
        try_files $uri $uri/ /dashboard/index.html;
    }

    # Auth callback routes to dashboard SPA
    location /auth/ {
        alias /usr/share/nginx/html/dashboard/;
        try_files $uri $uri/ /dashboard/index.html;
    }

    # Health check
    location = /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
