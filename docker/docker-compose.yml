# Docker orchestration for CharlyBot web infrastructure
# Production-like stack with Nginx reverse proxy and placeholder services
# Use: docker compose -f docker/docker-compose.yml up
services:
  # Valkey (cache) - must start first
  valkey:
    image: valkey/valkey:8.0
    command:
      - sh
      - -c
      - >-
        valkey-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        ${VALKEY_PASSWORD:+--requirepass "$VALKEY_PASSWORD"}
    expose:
      - "6379"
    volumes:
      - valkey-data:/data
    networks:
      - charlybot-net
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          valkey-cli ${VALKEY_PASSWORD:+-a "$VALKEY_PASSWORD"} ping
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # Landing (Angular SSR — port 4200)
  landing:
    build:
      context: ..
      dockerfile: apps/landing/Dockerfile
    env_file:
      - ./.env.landing
    expose:
      - "4200"
    networks:
      - charlybot-net
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e \"fetch('http://127.0.0.1:4200/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # Dashboard (Angular SPA — port 4201)
  dashboard:
    build:
      context: ..
      dockerfile: apps/dashboard/Dockerfile
    expose:
      - "4201"
    networks:
      - charlybot-net
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -q --spider http://127.0.0.1:4201/health || exit 1"
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # API service
  api:
    build:
      context: ..
      dockerfile: docker/docker/api.Dockerfile
    env_file:
      - ./.env.api
    expose:
      - "3000"
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - charlybot-net
    restart: unless-stopped
    command: ["bun", "run", "--cwd", "/app/apps/api", "start"]

  # Bot service
  bot:
    build:
      context: ..
      dockerfile: docker/docker/bot.Dockerfile
    env_file:
      - ./.env.bot
    depends_on:
      valkey:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - charlybot-net
    restart: unless-stopped
    command: ["bun", "run", "--cwd", "/app/apps/bot", "src/index.ts"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'bun.*index.ts' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Nginx reverse proxy
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      landing:
        condition: service_healthy
      dashboard:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - charlybot-net
    restart: unless-stopped

networks:
  charlybot-net:
    driver: bridge

volumes:
  valkey-data:
