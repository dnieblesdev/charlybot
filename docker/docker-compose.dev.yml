# Development harness — uses bind mounts for hot reload
# Use: docker compose -f docker/docker-compose.dev.yml up
services:
  valkey:
    image: valkey/valkey:8.0
    env_file:
      - ./env/dev/.env.valkey
    command:
      - sh
      - -c
      - >-
        valkey-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        ${VALKEY_PASSWORD:+--requirepass "$VALKEY_PASSWORD"}
    expose:
      - "6379"
    volumes:
      - valkey-data-dev:/data
    networks:
      - charlybot-net
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          valkey-cli ${VALKEY_PASSWORD:+-a "$VALKEY_PASSWORD"} ping
      interval: 10s
      timeout: 3s
      retries: 3

  # postgres:
  #   image: postgres:17-alpine
  #   environment:
  #     POSTGRES_USER: charlybot
  #     POSTGRES_PASSWORD: charlybot
  #     POSTGRES_DB: charlybot
  #   volumes:
  #     - postgres-data-dev:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   expose:
  #     - "5432"
  #   networks:
  #     - charlybot-net
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -h localhost -U charlybot"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5

  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@charlybot.local
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - charlybot-net
  #   profiles:
  #     - debug

  # API service — hot reload via tsx --watch
  api:
    build:
      context: ..
      dockerfile: docker/docker/api.Dockerfile
    env_file:
      - ./env/dev/.env.api
    volumes:
      - ../apps/api/src:/app/apps/api/src
      - ../packages/shared/src:/app/packages/shared/src
    expose:
      - "3000"
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - charlybot-net
    command: ["pnpm", "--filter", "@charlybot/api", "dev"]

  # Bot service — hot reload via tsx
  bot:
    build:
      context: ..
      dockerfile: docker/docker/bot.Dockerfile
    env_file:
      - ./env/dev/.env.bot
    volumes:
      - ../apps/bot/src:/app/apps/bot/src
      - ../packages/shared/src:/app/packages/shared/src
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - charlybot-net
    command: ["pnpm", "--filter", "@charlybot/bot", "dev"]

  # Landing — Angular SSR dev server with hot reload
  landing:
    build:
      context: ..
      dockerfile: docker/docker/landing.dev.Dockerfile
    env_file:
      - ./env/dev/.env.landing
    volumes:
      - ../apps/landing/src:/app/apps/landing/src
    expose:
      - "4200"
    networks:
      - charlybot-net

  # Dashboard — Angular SPA dev server with hot reload
  dashboard:
    build:
      context: ..
      dockerfile: docker/docker/dashboard.dev.Dockerfile
    volumes:
      - ../apps/dashboard/src:/app/apps/dashboard/src
    expose:
      - "4201"
    networks:
      - charlybot-net

  # Nginx reverse proxy
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - landing
      - dashboard
      - api
    networks:
      - charlybot-net

networks:
  charlybot-net:
    driver: bridge

volumes:
  valkey-data-dev:
  # postgres-data-dev:
