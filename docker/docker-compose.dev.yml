# Development harness — uses bind mounts for hot reload
# Use: docker compose -f docker/docker-compose.dev.yml up
services:
  valkey:
    image: valkey/valkey:8.0
    command:
      - sh
      - -c
      - >-
        valkey-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        ${VALKEY_PASSWORD:+--requirepass "$VALKEY_PASSWORD"}
    expose:
      - "6379"
    volumes:
      - valkey-data-dev:/data
    networks:
      - charlybot-net
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          valkey-cli ${VALKEY_PASSWORD:+-a "$VALKEY_PASSWORD"} ping
      interval: 10s
      timeout: 3s
      retries: 3

  # API service — hot reload via bun --hot
  api:
    build:
      context: ..
      dockerfile: docker/docker/api.Dockerfile
    env_file:
      - ./.env.api
    volumes:
      - ../apps/api/src:/app/apps/api/src
      - ../packages/shared/src:/app/packages/shared/src
    expose:
      - "3000"
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - charlybot-net
    command: ["bun", "run", "--cwd", "/app/apps/api", "dev"]

  # Bot service — hot reload via bun run
  bot:
    build:
      context: ..
      dockerfile: docker/docker/bot.Dockerfile
    env_file:
      - ./.env.bot
    volumes:
      - ../apps/bot/src:/app/apps/bot/src
      - ../packages/shared/src:/app/packages/shared/src
    depends_on:
      valkey:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - charlybot-net
    command: ["bun", "run", "--cwd", "/app/apps/bot", "dev"]

  # Landing — Angular SSR dev server with hot reload
  landing:
    build:
      context: ..
      dockerfile: docker/docker/landing.dev.Dockerfile
    env_file:
      - ./.env.landing
    volumes:
      - ../apps/landing/src:/app/src
      - /app/node_modules
    expose:
      - "4200"
    networks:
      - charlybot-net

  # Dashboard — Angular SPA dev server with hot reload
  dashboard:
    build:
      context: ..
      dockerfile: docker/docker/dashboard.dev.Dockerfile
    volumes:
      - ../apps/dashboard/src:/app/src
      - /app/node_modules
    expose:
      - "4201"
    networks:
      - charlybot-net

  # Nginx reverse proxy
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - landing
      - dashboard
      - api
    networks:
      - charlybot-net

networks:
  charlybot-net:
    driver: bridge

volumes:
  valkey-data-dev:
