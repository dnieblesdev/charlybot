# Nginx reverse proxy for CharlyBot
# Routes: / -> landing, /dashboard/ + /auth/ -> dashboard, /api/ -> api
#
# HTTPS is conditional — controlled by NGINX_HTTPS_ENABLED env var.
# When disabled (local dev), only HTTP/80 is active.
# When enabled (production), HTTPS/443 is active with mounted SSL certs.
#
# SSL cert mounting: ./nginx/ssl/fullchain.pem + ./nginx/ssl/privkey.pem

# Worker processes
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size 10M;

    # Rate limiting zone (10 req/s per IP for API, 30 req/s for static)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=static_limit:10m rate=30r/s;

    # ── Gzip compression ───────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security headers (server-level — applied to all locations) ────────────
    server_tokens off;

    # ── Upstream definitions (container names = DNS names in charlybot-net) ─────
    upstream landing_backend {
        server landing:4200;
    }

    upstream dashboard_backend {
        server dashboard:4201;
    }

    upstream api_backend {
        server api:3000;
    }

    # ── HTTP server (always active — redirects to HTTPS if enabled) ────────────
    server {
        listen 80;
        server_name _;

        # Conditional HTTPS redirect
        # If NGINX_HTTPS_ENABLED=true, redirect all HTTP → HTTPS
        # If not set or false, serve HTTP directly
        set $https_redirect "false";
        if ($http_x_forwarded_proto = "https") {
            set $https_redirect "no";  # already HTTPS, no redirect
        }

        # Let envsubst substitute NGINX_HTTPS_ENABLED at container start
        # Default behavior: serve HTTP when not set
        location / {
            # HTTP only — serve directly
            proxy_pass http://landing_backend;
            proxy_set_header Host charlybot.local;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            # Security headers (sent to client, not upstream)
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # Dashboard routes -> dashboard
        location /dashboard/ {
            proxy_pass http://dashboard_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            limit_req zone=static_limit burst=20 nodelay;

            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # Auth routes -> dashboard
        location /auth/ {
            proxy_pass http://dashboard_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            limit_req zone=static_limit burst=20 nodelay;

            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # API routes -> api
        location /api/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            limit_req zone=api_limit burst=10 nodelay;

            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # Exact /api/health -> api /health (public liveness)
        location = /api/health {
            proxy_pass http://api_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }

    # ── HTTPS server (conditionally active via entrypoint script) ───────────
    # The docker-entrypoint.sh script checks NGINX_HTTPS_ENABLED and SSL certs.
    # If both present → this block stays (nginx loads full config).
    # If disabled or certs missing → entrypoint removes this block with sed.
    # The ssl_certificate paths assume ./nginx/ssl/ is mounted as /etc/nginx/ssl:ro.
    server {
        listen 443 ssl;
        server_name _;

        # SSL certificate paths (mounted from host: ./nginx/ssl/:/etc/nginx/ssl:ro)
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Modern TLS configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Redirect /dashboard to /dashboard/
        location = /dashboard {
            return 301 /dashboard/;
        }

        # Root -> landing (HTTPS)
        location / {
            proxy_pass http://landing_backend;
            proxy_set_header Host charlybot.local;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_redirect off;

            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # Dashboard routes -> dashboard (HTTPS)
        location /dashboard/ {
            proxy_pass http://dashboard_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_redirect off;

            limit_req zone=static_limit burst=20 nodelay;

            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # Auth routes -> dashboard (HTTPS)
        location /auth/ {
            proxy_pass http://dashboard_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_redirect off;

            limit_req zone=static_limit burst=20 nodelay;

            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # API routes -> api (HTTPS)
        location /api/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_redirect off;

            limit_req zone=api_limit burst=10 nodelay;

            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # Exact /api/health -> api /health (public liveness, HTTPS)
        location = /api/health {
            proxy_pass http://api_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_redirect off;
        }
    }
}